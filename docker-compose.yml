services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: miciads_wp
      MYSQL_USER: miciads
      MYSQL_PASSWORD: miciads_secret_2026
      MYSQL_ROOT_PASSWORD: root_secret_2026
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:6.7-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: miciads_wp
      WORDPRESS_DB_USER: miciads
      WORDPRESS_DB_PASSWORD: miciads_secret_2026
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - ./mici-ads-theme:/var/www/html/wp-content/themes/mici-ads-theme
    ports:
      - "8080:80"

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  db_data:
  wp_data:
